<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống thi thử THPTQG - Môn Toán</title>
    <style>
        :root {
            --thpt-main: #0284C7;
            --thpt-dark: #1E293B;
            --thpt-accent: #0EA5E9;
            --thpt-success: #10B981;
            --thpt-danger: #EF4444;
            --bg-color: #F8FAFC;
            --border-color: #E2E8F0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Header */
        header { background: white; padding: 0 20px; display: flex; align-items: center; border-bottom: 2px solid var(--border-color); height: 60px; justify-content: space-between;}
        .logo-area { display: flex; align-items: center; cursor: pointer; }
        header h1 { font-size: 26px; color: var(--thpt-main); font-weight: 900; letter-spacing: -1px;}
        
        .tabs { display: flex; gap: 8px; margin-top: 25px; display: none; }
        .tab-btn { padding: 10px 18px; border: none; background: #f1f5f9; cursor: pointer; border-radius: 8px 8px 0 0; font-weight: 600; color: #64748b; border: 1px solid var(--border-color); border-bottom: none; transition: 0.3s; }
        .tab-btn.active { background: var(--thpt-main); color: white; border-color: var(--thpt-main); }

        /* Vùng Đồng hồ & Nút thoát trên Header */
        .header-controls { display: none; align-items: center; gap: 15px; }
        .header-timer { background: #f1f5f9; padding: 6px 15px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; }
        .header-timer .time-left { font-size: 20px; font-weight: bold; color: var(--thpt-main); font-variant-numeric: tabular-nums; }
        
        .home-btn { border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .exit-btn { background: #fef2f2; color: var(--thpt-danger); border: 1px solid #fca5a5; }
        .exit-btn:hover { background: var(--thpt-danger); color: white; }

        /* Giao diện HOME */
        #home-screen { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-color); }
        .page-title { text-align: center; color: var(--thpt-dark); margin-bottom: 30px; font-size: 32px;}
        .exam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .exam-card { background: white; border-radius: 12px; padding: 25px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column;}
        .exam-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--thpt-main);}
        .exam-tag { background: #e0f2fe; color: var(--thpt-main); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; align-self: flex-start; margin-bottom: 15px;}
        .exam-title { font-size: 18px; font-weight: bold; color: var(--thpt-dark); margin-bottom: 15px; line-height: 1.4;}
        .exam-meta { font-size: 14px; color: #64748b; margin-bottom: 20px; display: flex; justify-content: space-between;}
        .start-btn { background: var(--thpt-main); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; transition: 0.2s;}
        
        /* Main Workspace */
        #exam-workspace { display: none; flex: 1; overflow: hidden; }
        .left-panel { flex: 5; background: #525659; display: flex; flex-direction: column; border-right: 2px solid #ccc; }
        #pdf-frame { width: 100%; height: 100%; border: none; }

        .right-panel { flex: 4; display: flex; flex-direction: column; background: white; overflow-y: auto; padding: 20px; }
        .timer-header { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px;}
        .submit-btn { background: var(--thpt-success); color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);}
        .submit-btn:hover { filter: brightness(1.1); transform: translateY(-1px);}

        /* Question Blocks */
        .sheet-container { display: none; } 
        .sheet-container.active { display: block; }
        .question-block { background: white; border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 25px; padding: 25px; }
        .q-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 15px;}
        .q-num { background: #f0f9ff; padding: 6px 15px; border-radius: 20px; font-weight: bold; color: var(--thpt-main); font-size: 15px;}

        /* Nâng cấp UI trắc nghiệm (MCQ) */
        .mcq-options { display: flex; gap: 20px; flex-wrap: wrap; }
        .mcq-label { cursor: pointer; display: inline-block; }
        .mcq-label input { display: none; } /* Ẩn radio mặc định */
        .mcq-box { 
            display: flex; align-items: center; justify-content: center;
            width: 55px; height: 55px; border: 2px solid var(--border-color); border-radius: 12px;
            font-size: 18px; font-weight: bold; transition: all 0.2s ease; color: #475569; background: white;
        }
        .mcq-label:hover .mcq-box { 
            border-color: var(--thpt-danger); background: #fef2f2; color: var(--thpt-danger); 
            transform: translateY(-3px); box-shadow: 0 5px 10px rgba(239, 68, 68, 0.15);
        }
        .mcq-label input:checked + .mcq-box { 
            background: var(--thpt-main); border-color: var(--thpt-main); color: white; 
            transform: none; box-shadow: none;
        }

        /* Nâng cấp UI Đúng/Sai (TF) */
        .tf-grid { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .tf-grid th, .tf-grid td { padding: 10px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .tf-grid th { background: transparent; font-size: 15px; width: 90px; color: #64748b;}
        .tf-grid td.statement { text-align: left; font-weight: 600; width: auto; font-size: 16px; color: var(--thpt-dark);}
        
        .tf-label { cursor: pointer; display: inline-block; }
        .tf-label input { display: none; }
        .tf-box {
            display: inline-flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; border: 2px solid var(--border-color); border-radius: 10px;
            font-weight: bold; font-size: 16px; color: #64748b; background: white; transition: 0.2s;
        }
        .tf-label:hover .tf-box { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.08); }
        .tf-label:hover .true-box { border-color: var(--thpt-success); color: var(--thpt-success); background: #ecfdf5;}
        .tf-label:hover .false-box { border-color: var(--thpt-danger); color: var(--thpt-danger); background: #fef2f2;}
        
        .tf-label input:checked + .true-box { background: var(--thpt-success); border-color: var(--thpt-success); color: white; transform: none; box-shadow: none;}
        .tf-label input:checked + .false-box { background: var(--thpt-danger); border-color: var(--thpt-danger); color: white; transform: none; box-shadow: none;}

        .short-answer-input { width: 100%; padding: 15px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 18px; outline: none; transition: 0.2s; font-weight: bold; color: var(--thpt-dark);}
        .short-answer-input:focus { border-color: var(--thpt-main); box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);}

        /* Màn hình Tổng kết */
        #summary-screen { display: none; padding: 20px; text-align: center; }
        .summary-card { background: white; border: 1px solid var(--border-color); border-radius: 12px; padding: 40px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-top: 20px;}
        .final-score { font-size: 70px; font-weight: 900; color: var(--thpt-danger); line-height: 1; margin: 20px 0;}
        .stat-row { display: flex; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 16px;}
        
        .correct-text { color: var(--thpt-success); font-weight: bold; font-size: 15px; margin-top: 15px; display: block; background: #ecfdf5; padding: 10px; border-radius: 6px;}
        .wrong-bg { background-color: #fef2f2 !important; border-color: #fca5a5 !important; }
        .correct-bg { background-color: #f0fdf4 !important; border-color: #86efac !important; }

        /* MODAL CẢNH BÁO UI MỚI */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); z-index: 9999;
            display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .custom-modal-content {
            background: white; padding: 35px 30px; border-radius: 16px;
            width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transform: scale(0.9); transition: transform 0.3s ease;
        }
        .modal-overlay.show .custom-modal-content { transform: scale(1); }
        .modal-title { font-size: 22px; font-weight: 900; color: var(--thpt-dark); margin-bottom: 15px; }
        .modal-msg { font-size: 15px; color: #64748b; line-height: 1.5; margin-bottom: 25px; }
        .modal-actions { display: flex; gap: 15px; justify-content: center; }
        .btn-cancel, .btn-confirm { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; flex: 1; transition: 0.2s; }
        .btn-cancel { background: #f1f5f9; color: #475569; }
        .btn-cancel:hover { background: #e2e8f0; }
        .btn-confirm { background: var(--thpt-main); color: white; }
        .btn-confirm.danger { background: var(--thpt-danger); }
        .btn-confirm:hover { filter: brightness(1.1); transform: translateY(-1px);}
    </style>
</head>
<body>

    <header>
        <div class="logo-area" onclick="openModal('exit')">
            <h1>THPTQG 2026</h1>
        </div>
        <div class="tabs" id="tab-container"></div>
        
        <div class="header-controls" id="header-controls">
            <div class="header-timer">
                <span style="font-size: 12px; color: #64748b; font-weight: bold; text-transform: uppercase;">Thời gian</span>
                <span class="time-left" id="global-timer">--:--</span>
            </div>
            <button class="home-btn exit-btn" onclick="openModal('exit')">Thoát Đề</button>
        </div>
    </header>

    <div id="home-screen" class="fade-in">
        <h2 class="page-title">Danh sách đề thi hiện có</h2>
        <div class="exam-grid" id="exam-list">
            </div>
    </div>

    <div class="workspace" id="exam-workspace">
        <div class="left-panel">
            <iframe id="pdf-frame"></iframe>
        </div>

        <div class="right-panel">
            <div class="timer-header" id="control-header">
                <div><div style="font-weight: 900; color: var(--thpt-dark); font-size: 18px;" id="current-exam-name">Đang tải...</div></div>
                <button class="submit-btn" onclick="openModal('submit')">Nộp & Chấm điểm</button>
            </div>

            <div id="sheets-container"></div>

            <div id="summary-screen" class="fade-in">
                <div class="summary-card">
                    <h2 style="color: var(--thpt-dark); font-weight: 900;">KẾT QUẢ BÀI THI</h2>
                    <div class="final-score" id="final-score-text">0.00</div>
                    <p style="margin-bottom: 20px; color: #64748b;">Điểm thi tối đa là 10.0.</p>
                    <div id="summary-stats"></div>
                    <button class="submit-btn" style="background: var(--thpt-main); margin-top: 25px; width: 100%; padding: 15px;" onclick="switchTab(0)">
                        XEM LẠI ĐÁP ÁN CHI TIẾT
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="custom-modal">
        <div class="custom-modal-content">
            <div class="modal-title" id="modal-title">Xác nhận</div>
            <div class="modal-msg" id="modal-message">Nội dung...</div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Quay lại</button>
                <button class="btn-confirm" id="modal-confirm-btn" onclick="confirmAction()">Đồng ý</button>
            </div>
        </div>
    </div>

    <script>
        const EXAM_DATABASE = [
            {
                id: "toan_hanoi_2026",
                title: "Đề Khảo Tinh Tú - Thầy ĐVĐ",
                tag: "Mới nhất",
                pdfUrl: "exams/de-05-dvd.pdf",
                timeMinutes: 90,
                keys: {
                    P1: { 1: "A", 2: "B", 3: "C", 4: "D", 5: "A", 6: "B", 7: "C", 8: "D", 9: "A", 10: "B", 11: "C", 12: "D" },
                    P2: { 
                        1: { a: "T", b: "F", c: "T", d: "F" },
                        2: { a: "F", b: "F", c: "T", d: "T" },
                        3: { a: "T", b: "T", c: "T", d: "F" },
                        4: { a: "F", b: "T", c: "F", d: "T" }
                    },
                    P3: { 1: "15", 2: "-3", 3: "0.5", 4: "100", 5: "2", 6: "7" }
                }
            }
        ];

        const mathConfig = [
            { id: 'phan1', name: 'Phần I', type: 'mcq', qCount: 12, prefix: 'P1' },
            { id: 'phan2', name: 'Phần II', type: 'tf', qCount: 4, prefix: 'P2' },
            { id: 'phan3', name: 'Phần III', type: 'short', qCount: 6, prefix: 'P3' }
        ];

        let currentExam = null;
        let totalTime = 0;
        let timerInterval = null;
        let isSubmitted = false;
        let pendingAction = null; // Dùng cho Modal

        window.onload = () => {
            renderHome();
            const activeExam = localStorage.getItem('current_active_exam');
            if (activeExam) {
                startExam(activeExam); 
            }
        };

        function renderHome() {
            const list = document.getElementById('exam-list');
            list.innerHTML = '';
            EXAM_DATABASE.forEach(exam => {
                const savedState = localStorage.getItem(`exam_progress_${exam.id}`);
                const tagText = savedState ? "Đang làm dở..." : exam.tag;
                const tagColor = savedState ? "background: #fef08a; color: #ca8a04;" : "";

                list.innerHTML += `
                    <div class="exam-card" onclick="startExam('${exam.id}')">
                        <span class="exam-tag" style="${tagColor}">${tagText}</span>
                        <div class="exam-title">${exam.title}</div>
                        <div class="exam-meta">
                            <span>🕒 ${exam.timeMinutes} phút</span>
                            <span>Môn Toán</span>
                        </div>
                        <button class="start-btn">${savedState ? 'Tiếp tục làm bài' : 'Vào thi ngay'}</button>
                    </div>
                `;
            });
        }

        function startExam(examId) {
            currentExam = EXAM_DATABASE.find(e => e.id === examId);
            isSubmitted = false;
            
            localStorage.setItem('current_active_exam', examId);

            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('exam-workspace').style.display = 'flex';
            document.getElementById('tab-container').style.display = 'flex';
            document.getElementById('header-controls').style.display = 'flex'; // Hiện nhóm đồng hồ
            document.getElementById('control-header').style.display = 'flex';
            document.getElementById('summary-screen').style.display = 'none';

            document.getElementById('pdf-frame').src = currentExam.pdfUrl + "#toolbar=0&navpanes=0&scrollbar=0&view=FitH";
            document.getElementById('current-exam-name').innerText = currentExam.title;
            
            totalTime = currentExam.timeMinutes * 60;
            initAnswerSheets();
            loadProgress();
            startTimer();
        }

        function goHome() {
            clearInterval(timerInterval);
            saveProgress(); 
            localStorage.removeItem('current_active_exam'); 
            
            document.getElementById('exam-workspace').style.display = 'none';
            document.getElementById('home-screen').style.display = 'block';
            document.getElementById('tab-container').style.display = 'none';
            document.getElementById('header-controls').style.display = 'none'; // Ẩn nhóm đồng hồ
            renderHome();
        }

        // --- HỆ THỐNG MODAL ---
        function openModal(action) {
            // Nếu đã nộp bài rồi mà bấm logo để về home thì về luôn không cần hỏi
            if (action === 'exit' && isSubmitted) {
                goHome();
                return;
            }

            const modal = document.getElementById('custom-modal');
            const title = document.getElementById('modal-title');
            const msg = document.getElementById('modal-message');
            const confirmBtn = document.getElementById('modal-confirm-btn');

            if (action === 'submit') {
                title.innerText = "Nộp bài & Chấm điểm";
                msg.innerText = "Em có chắc chắn muốn nộp toàn bộ bài thi? Sau khi nộp sẽ không thể sửa lại đáp án.";
                confirmBtn.className = "btn-confirm";
                confirmBtn.innerText = "Nộp bài ngay";
                pendingAction = submitAndGrade;
            } else if (action === 'exit') {
                title.innerText = "Thoát đề thi";
                msg.innerText = "Dữ liệu làm bài của em sẽ được lưu lại tự động. Lần sau vào lại em có thể làm tiếp. Em có muốn thoát không?";
                confirmBtn.className = "btn-confirm danger";
                confirmBtn.innerText = "Thoát đề";
                pendingAction = goHome;
            }

            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
            pendingAction = null;
        }

        function confirmAction() {
            if (pendingAction) pendingAction();
            closeModal();
        }
        // ----------------------

        function initAnswerSheets() {
            const tabs = document.getElementById('tab-container');
            const sheets = document.getElementById('sheets-container');
            tabs.innerHTML = ''; sheets.innerHTML = '';

            mathConfig.forEach((sec, index) => {
                tabs.innerHTML += `<button class="tab-btn ${index === 0 ? 'active' : ''}" id="tab-btn-${index}" onclick="switchTab(${index})">${sec.name}</button>`;
                
                let html = `<div id="sheet-${sec.id}" class="sheet-container ${index === 0 ? 'active fade-in' : ''}">`;
                for (let i = 1; i <= sec.qCount; i++) {
                    let qBody = '';
                    if (sec.type === 'mcq') {
                        // Áp dụng UI Box mới
                        qBody = `<div class="mcq-options">${['A', 'B', 'C', 'D'].map(opt => `
                            <label class="mcq-label">
                                <input type="radio" name="ans_${sec.prefix}_${i}" value="${opt}" onchange="saveProgress()">
                                <span class="mcq-box">${opt}</span>
                            </label>`).join('')}</div>`;
                    } else if (sec.type === 'tf') {
                        // Áp dụng UI Đúng/Sai mới
                        qBody = `<table class="tf-grid"><tr><th>Ý</th><th>Đúng</th><th>Sai</th></tr>${['a', 'b', 'c', 'd'].map(opt => `
                            <tr>
                                <td class="statement">Ý ${opt}</td>
                                <td>
                                    <label class="tf-label">
                                        <input type="radio" name="ans_${sec.prefix}_${i}_${opt}" value="T" onchange="saveProgress()">
                                        <span class="tf-box true-box">Đ</span>
                                    </label>
                                </td>
                                <td>
                                    <label class="tf-label">
                                        <input type="radio" name="ans_${sec.prefix}_${i}_${opt}" value="F" onchange="saveProgress()">
                                        <span class="tf-box false-box">S</span>
                                    </label>
                                </td>
                            </tr>`).join('')}</table>`;
                    } else if (sec.type === 'short') {
                        qBody = `<input type="text" class="short-answer-input" id="ans_${sec.prefix}_${i}" placeholder="Nhập số/đáp án..." oninput="saveProgress()">`;
                    }
                    html += `<div class="question-block" id="block_${sec.prefix}_${i}"><div class="q-header"><div class="q-num">Câu ${i}</div></div><div class="q-body">${qBody}</div><div class="result-feedback" id="feedback_${sec.prefix}_${i}"></div></div>`;
                }
                html += '</div>';
                sheets.innerHTML += html;
            });
        }

        function switchTab(index) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.sheet-container').forEach(sheet => sheet.classList.remove('active'));
            document.getElementById(`tab-btn-${index}`).classList.add('active');
            document.getElementById(`sheet-${mathConfig[index].id}`).classList.add('active', 'fade-in');
            document.getElementById('summary-screen').style.display = 'none';
        }

        function saveProgress() {
            if (!currentExam || isSubmitted) return;
            const state = { timeLeft: totalTime, answers: {} };
            
            document.querySelectorAll('input[type="radio"]:checked').forEach(el => {
                state.answers[el.name] = el.value;
            });
            document.querySelectorAll('input[type="text"]').forEach(el => {
                if (el.value.trim() !== '') state.answers[el.id] = el.value.trim();
            });
            
            localStorage.setItem(`exam_progress_${currentExam.id}`, JSON.stringify(state));
        }

        function loadProgress() {
            const saved = localStorage.getItem(`exam_progress_${currentExam.id}`);
            if (saved) {
                const state = JSON.parse(saved);
                totalTime = state.timeLeft;
                
                for (const key in state.answers) {
                    const val = state.answers[key];
                    const radio = document.querySelector(`input[name="${key}"][value="${val}"]`);
                    if (radio) radio.checked = true;
                    const textInput = document.getElementById(key);
                    if (textInput) textInput.value = val;
                }
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (totalTime <= 0) {
                    openModal('submit'); // Tự động mở bảng nộp khi hết giờ
                    return;
                }
                totalTime--;
                const m = Math.floor(totalTime / 60).toString().padStart(2, '0');
                const s = (totalTime % 60).toString().padStart(2, '0');
                document.getElementById('global-timer').innerText = `${m}:${s}`;
                
                saveProgress();
            }, 1000);
        }

        function submitAndGrade() {
            clearInterval(timerInterval);
            isSubmitted = true;
            document.getElementById('control-header').style.display = 'none';
            document.getElementById('header-controls').style.display = 'none'; // Giấu đồng hồ khi nộp xong

            localStorage.removeItem(`exam_progress_${currentExam.id}`);
            localStorage.removeItem('current_active_exam');

            let totalScore = 0;
            const key = currentExam.keys;
            
            let p1Correct = 0;
            for(let i=1; i<=12; i++) {
                const checked = document.querySelector(`input[name="ans_P1_${i}"]:checked`);
                const userAns = checked ? checked.value : null;
                const correctAns = key.P1 ? key.P1[i] : null;
                
                const block = document.getElementById(`block_P1_${i}`);
                if (userAns === correctAns && correctAns) {
                    p1Correct++;
                    block.classList.add('correct-bg');
                } else {
                    block.classList.add('wrong-bg');
                    document.getElementById(`feedback_P1_${i}`).innerHTML = `<span class="correct-text">🎯 Đáp án đúng: ${correctAns}</span>`;
                }
            }
            totalScore += p1Correct * 0.25;

            let p2Score = 0;
            for(let i=1; i<=4; i++) {
                let correctItems = 0;
                ['a','b','c','d'].forEach(opt => {
                    const checked = document.querySelector(`input[name="ans_P2_${i}_${opt}"]:checked`);
                    const userAns = checked ? checked.value : null;
                    const correctAns = (key.P2 && key.P2[i]) ? key.P2[i][opt] : null;
                    if (userAns === correctAns && correctAns) correctItems++;
                });

                let points = 0;
                if (correctItems === 1) points = 0.1;
                else if (correctItems === 2) points = 0.25;
                else if (correctItems === 3) points = 0.5;
                else if (correctItems === 4) points = 1.0;

                p2Score += points;
                
                const block = document.getElementById(`block_P2_${i}`);
                if (correctItems === 4) block.classList.add('correct-bg');
                else {
                    block.classList.add('wrong-bg');
                    const k = key.P2[i];
                    document.getElementById(`feedback_P2_${i}`).innerHTML = `<span class="correct-text">🎯 Đáp án đúng: a-${k.a}, b-${k.b}, c-${k.c}, d-${k.d} (Em đúng ${correctItems}/4 ý: +${points}đ)</span>`;
                }
            }
            totalScore += p2Score;

            let p3Correct = 0;
            for(let i=1; i<=6; i++) {
                const input = document.getElementById(`ans_P3_${i}`);
                const userAns = input ? input.value.trim() : ""; 
                const correctAns = key.P3 ? String(key.P3[i]).trim() : null;

                const block = document.getElementById(`block_P3_${i}`);
                if (userAns === correctAns && correctAns) {
                    p3Correct++;
                    block.classList.add('correct-bg');
                } else {
                    block.classList.add('wrong-bg');
                    document.getElementById(`feedback_P3_${i}`).innerHTML = `<span class="correct-text">🎯 Đáp án đúng: ${correctAns}</span>`;
                }
            }
            totalScore += p3Correct * 0.5;

            document.querySelectorAll('input').forEach(el => el.disabled = true);
            document.getElementById('final-score-text').innerText = totalScore.toFixed(2);
            
            document.getElementById('summary-stats').innerHTML = `
                <div class="stat-row"><span>Phần I (Trắc nghiệm)</span><b>${p1Correct}/12 câu (+${p1Correct * 0.25}đ)</b></div>
                <div class="stat-row"><span>Phần II (Đúng/Sai)</span><b>(+${p2Score.toFixed(2)}đ)</b></div>
                <div class="stat-row"><span>Phần III (Trả lời ngắn)</span><b>${p3Correct}/6 câu (+${p3Correct * 0.5}đ)</b></div>
            `;
            
            document.querySelectorAll('.sheet-container').forEach(sheet => sheet.classList.remove('active'));
            document.getElementById('summary-screen').style.display = 'block';
        }
    </script>
</body>
</html>
